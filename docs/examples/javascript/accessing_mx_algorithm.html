<!doctype html>
<!--
  Per-example page template.  To make a page for `foo.js`, copy this
  file to `foo.html` and replace every accessing_mx_algorithm with `foo`.

  Run it: this page must be SERVED OVER HTTP (not opened as file://),
  and the casadi build artifacts (casadi.js, casadi_wasm.js,
  casadi_wasm.wasm, casadi_wasm.data) must be reachable.  The simplest
  setup, from this directory:

      ln -sf ../../../build-wasm/swig/wasm-js/casadi*.{js,wasm,data} .
      python3 -m http.server 8000
      # open http://localhost:8000/accessing_mx_algorithm.html

  If the artifacts live elsewhere, point at them with a query string:
      http://localhost:8000/accessing_mx_algorithm.html?casadi=/path/to/wasm-js/
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>accessing_mx_algorithm — CasADi (JavaScript / WebAssembly)</title>
<style>
  body { font: 14px/1.5 ui-monospace, Menlo, Consolas, monospace; margin: 2rem; max-width: 64rem; color: #222; }
  h1 { font-size: 1.15rem; } a { color: #1565c0; }
  #out { background: #f5f5f5; border: 1px solid #ddd; padding: 1rem; white-space: pre-wrap; min-height: 4rem; }
  button { font: inherit; padding: .3rem .8rem; margin-bottom: .6rem; }
  .err { color: #c62828; }
</style>
</head>
<body>
<h1>CasADi example: <code>accessing_mx_algorithm</code></h1>
<p>Source: <a href="accessing_mx_algorithm.js">accessing_mx_algorithm.js</a> — runs entirely in your browser via WebAssembly.</p>
<button id="run" disabled>Run again</button>
<div id="out">Loading casadi.wasm…</div>

<script src="_casadi_browser.js"></script>
<script src="accessing_mx_algorithm.js"></script>
<script>
  const out = document.getElementById("out");
  const btn = document.getElementById("run");
  const log = (...a) => { out.textContent += a.join(" ") + "\n"; };
  const base = new URLSearchParams(location.search).get("casadi") || "./";
  const run = (M) => { out.textContent = ""; return example(M, log); };

  loadCasadi(base).then((M) => {
    btn.disabled = false;
    btn.onclick = () => run(M).catch((e) => log("FATAL: " + (e.message || e)));
    return run(M);
  }).catch((e) => {
    out.textContent = "Failed to load casadi: " + (e.message || e);
    out.className = "err";
  });
</script>
</body>
</html>
