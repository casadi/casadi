name: Branch and nightly-release cleanup audit

on:
  schedule:
    - cron: '0 9 * * 1'  # Mondays 09:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Audit nightly releases and stale branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Index every branch with its tip SHA.
          # canonical_branches maps "/"->"-" canonicalized name to original name
          # (used to match nightly-<canonical> release tags).
          # branch_tips maps original branch name to tip commit SHA.
          declare -A canonical_branches
          declare -A branch_tips
          while IFS=$'\t' read -r name sha; do
            [ -n "$name" ] || continue
            canonical_branches["${name//\//-}"]=$name
            branch_tips["$name"]=$sha
          done < <(
            gh api --paginate "repos/$REPO/branches" \
              --jq '.[] | [.name, .commit.sha] | @tsv'
          )
          echo "Indexed ${#canonical_branches[@]} branch(es)."

          default_branch="$(gh api "repos/$REPO" --jq '.default_branch')"
          echo "Default branch: $default_branch"

          # --- Orphaned nightly releases ---------------------------------

          # Pull tag_name + published_at; build canonical-branch-name -> tag map
          # (used by the branches section below) and a tag -> date map (used
          # for sorting and display here).
          declare -A nightly_for_canonical
          declare -A nightly_dates
          while IFS=$'\t' read -r tag published; do
            [ -n "$tag" ] || continue
            nightly_dates["$tag"]="$published"
            nightly_for_canonical["${tag#nightly-}"]="$tag"
          done < <(
            gh api --paginate "repos/$REPO/releases" \
              --jq '.[] | select(.tag_name | startswith("nightly-")) | [.tag_name, .published_at] | @tsv'
          )
          echo "Found ${#nightly_dates[@]} nightly-* release(s)."

          {
            echo "## Orphaned nightly releases"
            echo ""
            echo "Releases tagged \`nightly-<branch>\` whose branch no longer exists in \`$REPO\`."
            echo "Branch slashes are canonicalized to \`-\` in tag names, so a tag"
            echo "\`nightly-a-b-c\` matches any branch that canonicalizes to \`a-b-c\`"
            echo "(e.g. \`a/b/c\`, \`a-b/c\`, \`a/b-c\`, or \`a-b-c\`)."
            echo "Sorted oldest first."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Buffer lines with an ISO-date prefix so a lexical sort is
          # chronological, then strip the prefix on output.
          declare -a orphan_lines
          for tag in "${!nightly_dates[@]}"; do
            suffix="${tag#nightly-}"
            if [ -z "${canonical_branches[$suffix]+x}" ]; then
              published="${nightly_dates[$tag]}"
              day="${published%%T*}"
              orphan_lines+=("$published"$'\t'"- [\`$tag\`]($GITHUB_SERVER_URL/$REPO/releases/tag/$tag) ($day)")
            fi
          done

          if [ "${#orphan_lines[@]}" -eq 0 ]; then
            echo "_None._" >> "$GITHUB_STEP_SUMMARY"
          else
            printf '%s\n' "${orphan_lines[@]}" | sort | cut -f2- >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Orphaned releases: ${#orphan_lines[@]}"

          # --- Branches whose tip is already in the default branch -------
          #
          # We use the compare API and check the "status" field:
          #   identical -> branch tip == default tip
          #   behind    -> branch tip is a strict ancestor of default tip
          # In both cases the branch contributes nothing new and is safe to
          # consider for deletion. We compare by SHA to dodge URL-encoding
          # issues for branch names containing slashes.

          {
            echo ""
            echo "## Branches already in \`$default_branch\`"
            echo ""
            echo "Branches whose tip commit is reachable from \`$default_branch\` (merged or pure ancestors)."
            echo "Sorted oldest tip first."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Buffer lines with an ISO-date prefix for chronological sort below.
          # For status=behind/identical, merge_base_commit == branch tip, so its
          # committer date is the branch's youngest commit date — we pull it
          # from the same compare call to avoid a second request per branch.
          declare -a branch_lines
          while IFS= read -r b; do
            [ "$b" != "$default_branch" ] || continue
            sha="${branch_tips[$b]}"
            res="$(gh api "repos/$REPO/compare/$default_branch...$sha" \
                    --jq '[.status, (.merge_base_commit.commit.committer.date // "")] | @tsv' \
                    2>/dev/null || echo $'error\t')"
            IFS=$'\t' read -r status date <<< "$res"
            case "$status" in
              behind|identical)
                # GitHub accepts unencoded slashes in branch URLs (e.g. /tree/foo/bar),
                # but the branches/all?query= param needs proper percent-encoding.
                branch_link="$GITHUB_SERVER_URL/$REPO/tree/$b"
                b_encoded="$(jq -rn --arg b "$b" '$b|@uri')"
                delete_link="$GITHUB_SERVER_URL/$REPO/branches/all?query=$b_encoded"
                nightly_tag="${nightly_for_canonical[${b//\//-}]:-}"
                if [ -n "$nightly_tag" ]; then
                  nightly_suffix=" — nightly [\`$nightly_tag\`]($GITHUB_SERVER_URL/$REPO/releases/tag/$nightly_tag)"
                else
                  nightly_suffix=""
                fi
                day="${date%%T*}"
                branch_lines+=("$date"$'\t'"- [\`$b\`]($branch_link) ([${sha:0:7}]($GITHUB_SERVER_URL/$REPO/commit/$sha), $day) — $status — [delete]($delete_link)$nightly_suffix")
                ;;
            esac
          done < <(printf '%s\n' "${!branch_tips[@]}" | sort)

          if [ "${#branch_lines[@]}" -eq 0 ]; then
            echo "_None._" >> "$GITHUB_STEP_SUMMARY"
          else
            printf '%s\n' "${branch_lines[@]}" | sort | cut -f2- >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Branches in $default_branch: ${#branch_lines[@]}"
