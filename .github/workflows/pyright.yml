name: pyright

on: [push, pull_request]

jobs:
  python-stubs:
    if: ${{ !contains(github.event.head_commit.message, '[skip-ci:pyright]') }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4.1.1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y swig
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib scipy pyright
      - name: Build Python bindings
        run: |
          cmake -Bbuild -DWITH_SELFCONTAINED=ON -DWITH_BUILD_REQUIRED=ON -DWITH_COMMON=OFF -DWITH_PYTHON=ON -DWITH_PYTHON3=ON -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install -S.
          cmake --build build --target install --parallel 2
      - name: Verify inline stubs are installed
        run: |
          test -f install/casadi/__init__.pyi
          test -f install/casadi/_api_surface.pyi
          test -f install/casadi/casadi.pyi
          test -f install/casadi/py.typed
      - name: Verify generated API surface stub is current
        env:
          PYTHONPATH: ${{ github.workspace }}/install
        run: |
          python test/typing/generate_api_surface.py stub --module casadi --output swig/python/stubs/casadi/_api_surface.pyi --check
      - name: Run pyright smoke test
        run: |
          cd test/typing
          pyright --project pyrightconfig.json
      - name: Run pyright on full exported API surface
        env:
          PYTHONPATH: ${{ github.workspace }}/install
        run: |
          python test/typing/generate_api_surface.py access-check --module casadi --output test/typing/_generated_api_surface_check.py
          cd test/typing
          pyright --project pyright_api_surfaceconfig.json
      - name: Run pyright on repo examples
        run: |
          cd test/typing
          pyright --project pyright_examplesconfig.json
